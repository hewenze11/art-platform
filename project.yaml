# ============================================================
# 美术资源审核平台 - 项目配置文件
# 每个项目独立填写此文件，填完即可对接本项目的美术审核流程
# ============================================================

project:
  name: "我的游戏项目"           # 项目显示名称
  description: "游戏美术资源审核平台"  # 项目简介
  logo_url: ""                   # 项目 Logo URL（可选）

cicd:
  # GitHub / GitLab 仓库地址（用于资源提交后触发 CI/CD）
  repo_url: "https://github.com/your-org/your-game-assets"
  branch: "main"                 # 触发 CI/CD 的分支
  
  # GitHub Actions / GitLab CI Token（用于触发 pipeline，可留空）
  ci_token: ""
  
  # CI/CD webhook URL（POST 触发，可留空）
  webhook_url: ""

  # GitLab CI trigger token（可留空）
  gitlab_token: ""

  # GitLab pipeline trigger URL（可留空）
  gitlab_trigger_url: ""

  # GitHub Actions event type（repository_dispatch 事件名）
  github_actions_event: "art_approved"

storage:
  # 资源文件存储目录（容器内路径）
  upload_dir: "/data/uploads"
  
  # 最大文件大小（MB）
  max_file_size_mb: 50
  
  # 允许的文件类型
  allowed_extensions:
    - png
    - jpg
    - jpeg
    - gif
    - webp
    - psd
    - svg
    - mp4
    - fbx
    - obj
    - unity3d

review:
  # 审核员列表（显示名称，用于任务认领）
  reviewers:
    - "CTO"
    - "主美"
    - "程序"
  
  # 任务优先级选项
  priorities:
    - "紧急"
    - "高"
    - "中"
    - "低"
  
  # 资源分类
  categories:
    - "角色"
    - "场景"
    - "UI"
    - "特效"
    - "音效"
    - "动画"
    - "其他"

notifications:
  # 飞书 Webhook（任务状态变更时通知，可留空）
  feishu_webhook: ""
  
  # 企业微信 Webhook（可留空）
  wecom_webhook: ""

server:
  port: 8899                     # 服务端口
  debug: false
