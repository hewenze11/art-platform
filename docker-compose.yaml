version: "3.8"
services:
  art-platform:
    image: ghcr.io/hewenze11/art-platform:latest
    container_name: art-platform
    restart: unless-stopped
    ports:
      - "${PORT:-8899}:8899"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - PORT=8899
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8899/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
