<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ArtHub</title>
<style>
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#242838;--border:#2d3148;--accent:#5b6af0;--ah:#7280ff;--danger:#e05252;--success:#4caf82;--warn:#e0a040;--purple:#b06af0;--text:#e2e4f0;--t2:#8890b0;--t3:#5a6080;--r:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:200;}
.logo{font-size:17px;font-weight:700;color:var(--accent);}
.pname{font-size:13px;color:var(--t2);border-left:1px solid var(--border);padding-left:12px;margin-left:12px;}
.sbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:10px;overflow-x:auto;flex-shrink:0;min-height:82px;}
.sc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;min-width:172px;cursor:pointer;transition:border-color .15s;position:relative;flex-shrink:0;}
.sc:hover{border-color:var(--accent);}.sc.active{border-color:var(--accent);background:rgba(91,106,240,.1);}
.sc-ver{font-size:14px;font-weight:700;margin-bottom:3px;}
.sc-name{font-size:11px;color:var(--t3);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:138px;}
.sc-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;}
.br{background:rgba(224,160,64,.2);color:var(--warn);}.ba{background:rgba(76,175,130,.2);color:var(--success);}.bl{background:rgba(90,96,128,.2);color:var(--t3);}
.sc-prog{height:3px;background:var(--border);border-radius:2px;margin-top:5px;}
.sc-fill{height:3px;background:var(--success);border-radius:2px;}
.sc-cnt{font-size:10px;color:var(--t3);margin-top:3px;}
.sc-mb{position:absolute;top:8px;right:6px;background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;}
.sc-mb:hover{background:var(--border);}
.sc-add{background:transparent;border:1px dashed var(--border);border-radius:var(--r);padding:10px 14px;min-width:108px;cursor:pointer;color:var(--t3);font-size:13px;transition:all .15s;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:5px;}
.sc-add:hover{border-color:var(--accent);color:var(--accent);}
.dd{position:absolute;top:100%;right:0;margin-top:4px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);min-width:145px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:400;display:none;}
.ddi{padding:8px 13px;font-size:13px;cursor:pointer;white-space:nowrap;}
.ddi:hover{background:var(--bg3);}
.ddi.ok{color:var(--success);}.ddi.warn{color:var(--warn);}
.layout{display:flex;flex:1;min-height:0;}
.sidebar{width:176px;min-width:176px;background:var(--bg2);border-right:1px solid var(--border);padding:12px 10px;overflow-y:auto;flex-shrink:0;}
.sidebar h4{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin:0 4px 7px;}
.fb{display:flex;align-items:center;gap:6px;width:100%;padding:6px 10px;border-radius:6px;border:none;background:transparent;color:var(--t2);font-size:13px;cursor:pointer;text-align:left;transition:all .15s;margin-bottom:2px;}
.fb:hover{background:var(--bg3);color:var(--text);}.fb.active{background:rgba(91,106,240,.15);color:var(--accent);}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.da{background:var(--t3);}.dp{background:var(--t2);}.dr{background:var(--warn);}.dok{background:var(--success);}.dej{background:var(--danger);}.dc{background:var(--purple);}
.sep{height:1px;background:var(--border);margin:8px 0;}
.content{flex:1;overflow-y:auto;padding:16px 20px;}
.rob{background:rgba(90,96,128,.08);border:1px solid var(--border);border-radius:var(--r);padding:8px 14px;font-size:12px;color:var(--t3);margin-bottom:12px;}
.ltop{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.ltop h2{font-size:14px;font-weight:600;}
.vbtn{padding:5px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--t2);font-size:12px;cursor:pointer;transition:all .15s;}
.vbtn:hover,.vbtn.on{background:var(--bg3);color:var(--text);border-color:var(--accent);}
.bbr{background:var(--bg3);border:1px solid var(--accent);border-radius:var(--r);padding:7px 12px;margin-bottom:10px;display:none;align-items:center;gap:10px;font-size:13px;}
.bbr.show{display:flex;}
.ac{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.ac:hover{border-color:var(--accent);}
.act{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.acn{font-size:14px;font-weight:600;flex:1;}
.acr{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.acm{display:flex;gap:9px;margin-top:6px;font-size:12px;color:var(--t3);flex-wrap:wrap;}
.ck{width:15px;height:15px;cursor:pointer;flex-shrink:0;margin-top:2px;}
.tag{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;}
.t-pending{background:rgba(136,144,176,.15);color:var(--t2);}
.t-in_review{background:rgba(224,160,64,.15);color:var(--warn);}
.t-approved{background:rgba(76,175,130,.15);color:var(--success);}
.t-rejected{background:rgba(224,82,82,.15);color:var(--danger);}
.t-changes_requested{background:rgba(176,106,240,.15);color:var(--purple);}
.p紧急{color:var(--danger);}.p高{color:var(--warn);}.p中{color:var(--t2);}.p低{color:var(--t3);}
.bdel{padding:3px 8px;border-radius:5px;border:1px solid rgba(224,82,82,.35);background:transparent;color:var(--danger);font-size:11px;cursor:pointer;}
.bdel:hover{background:rgba(224,82,82,.15);}
.kb{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;min-height:400px;}
.kc{width:220px;min-width:220px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;}
.kch{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;}
.kcb{flex:1;overflow-y:auto;padding:7px;}
.kk{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 11px;margin-bottom:6px;cursor:pointer;font-size:13px;transition:border-color .15s;}
.kk:hover{border-color:var(--accent);}
.kkn{font-weight:600;margin-bottom:4px;}
.kkm{font-size:11px;color:var(--t3);display:flex;gap:6px;flex-wrap:wrap;}
.empty{text-align:center;padding:50px 20px;color:var(--t3);}
.ns{text-align:center;padding:60px 20px;color:var(--t3);}
.ns p{margin-bottom:16px;font-size:14px;}
.btn{padding:7px 14px;border-radius:6px;border:none;font-size:13px;cursor:pointer;font-weight:500;}
.bp{background:var(--accent);color:#fff;}.bp:hover{background:var(--ah);}
.bg{background:transparent;color:var(--t2);border:1px solid var(--border);}.bg:hover{background:var(--bg3);}
.bd{background:var(--danger);color:#fff;}.bs{background:var(--success);color:#fff;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center;}
.ov.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:520px;max-width:96vw;max-height:88vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.5);}
.mlg{width:700px;}.msm{width:400px;}
.mh{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.mh h3{font-size:15px;font-weight:600;}
.mcl{background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer;}
.mb{padding:16px 20px;}.mf{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:12px;color:var(--t2);margin-bottom:4px;font-weight:500;}
.fg input,.fg textarea,.fg select{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:inherit;}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--accent);}
.fg textarea{resize:vertical;min-height:70px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.kv{display:grid;grid-template-columns:90px 1fr;gap:4px 10px;font-size:13px;margin-bottom:14px;}
.kv .k{color:var(--t3);}
.dsec{margin-bottom:16px;}
.dsec h4{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.fstrip{display:flex;gap:8px;overflow-x:auto;padding:4px 0;}
.fthumb{width:80px;height:80px;border-radius:6px;border:1px solid var(--border);overflow:hidden;flex-shrink:0;cursor:pointer;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;font-size:10px;color:var(--t3);text-align:center;padding:4px;}
.fthumb img{width:100%;height:100%;object-fit:cover;}
.fthumb:hover{border-color:var(--accent);}
.rvc{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 11px;margin-bottom:6px;}
.rvt{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;font-size:12px;}
.cmi{display:flex;gap:8px;margin-bottom:8px;}
.cav{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cmet{font-size:11px;color:var(--t3);margin-bottom:2px;display:flex;gap:6px;align-items:center;}
.cdel{background:none;border:none;color:var(--t3);cursor:pointer;font-size:11px;}
.cdel:hover{color:var(--danger);}
.ccnt{font-size:13px;color:var(--t2);line-height:1.5;}
.cinp{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px;}
.crow{display:flex;gap:8px;margin-top:8px;}
.crow select,.crow textarea{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:13px;font-family:inherit;}
.crow select{padding:7px 9px;font-size:12px;}
.crow textarea{flex:1;min-height:50px;resize:vertical;padding:7px 9px;}
.crow select:focus,.crow textarea:focus{outline:none;border-color:var(--accent);}
.iov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;display:none;align-items:center;justify-content:center;cursor:zoom-out;}
.iov.open{display:flex;}
.iov img{max-width:90vw;max-height:90vh;border-radius:6px;}
.tw{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px;}
.toast{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:fin .2s;}
.toast.err{border-color:var(--danger);color:var(--danger);}
@keyframes fin{from{opacity:0;transform:translateY(6px);}to{opacity:1;}}
.ali{font-size:12px;color:var(--t3);padding:3px 0;border-bottom:1px solid var(--border);}
.ali:last-child{border-bottom:none;}
</style>
</head>
<body>
<div class="topbar">
  <div style="display:flex;align-items:center">
    <div class="logo">&#127912; ArtHub</div>
    <div class="pname" id="pname">加载中&#8230;</div>
  </div>
  <button class="btn bg" onclick="openCfg()">&#9881; 项目配置</button>
</div>
<div class="sbar" id="sbar"><div style="color:var(--t3);font-size:13px">加载中&#8230;</div></div>
<div class="layout">
  <div class="sidebar">
    <h4>资源状态</h4>
    <button class="fb active" onclick="setStatus(this,'')"><span class="dot da"></span>全部</button>
    <button class="fb" onclick="setStatus(this,'pending')"><span class="dot dp"></span>待认领</button>
    <button class="fb" onclick="setStatus(this,'in_review')"><span class="dot dr"></span>审核中</button>
    <button class="fb" onclick="setStatus(this,'approved')"><span class="dot dok"></span>已通过</button>
    <button class="fb" onclick="setStatus(this,'rejected')"><span class="dot dej"></span>已拒绝</button>
    <button class="fb" onclick="setStatus(this,'changes_requested')"><span class="dot dc"></span>需修改</button>
    <div class="sep"></div>
    <h4>分类</h4>
    <div id="catBtns"></div>
  </div>
  <div class="content" id="mc"></div>
</div>
<div class="tw" id="tw"></div>
<div class="iov" id="iov" onclick="this.classList.remove('open')"><img id="iovImg" src="" alt=""/></div>

<!-- 新建快照 -->
<div class="ov" id="mNewSnap"><div class="modal">
  <div class="mh"><h3>&#128248; 新建版本快照</h3><button class="mcl" onclick="close_('mNewSnap')">&#x2715;</button></div>
  <div class="mb">
    <div class="fg"><label>版本号 *</label><input id="ns-ver" placeholder="如：v1.0、v2"/></div>
    <div class="fg"><label>快照名称</label><input id="ns-name" placeholder="如：首发资源包"/></div>
    <div class="fg"><label>创建人</label><input id="ns-by" placeholder="你的名字"/></div>
    <div class="fg">
      <label>继承自</label>
      <select id="ns-inh"><option value="">不继承（空快照）</option></select>
      <div style="font-size:11px;color:var(--t3);margin-top:4px">继承时复制该快照所有资源（状态重置为待认领）</div>
    </div>
  </div>
  <div class="mf"><button class="btn bg" onclick="close_('mNewSnap')">取消</button><button class="btn bp" onclick="submitSnap()">创建快照</button></div>
</div></div>

<!-- 新建资源 -->
<div class="ov" id="mNewAsset"><div class="modal">
  <div class="mh"><h3>&#65291; 新建资源</h3><button class="mcl" onclick="close_('mNewAsset')">&#x2715;</button></div>
  <div class="mb">
    <div class="fg"><label>资源名称 *</label><input id="na-name" placeholder="如：火焰法师-稀有卡"/></div>
    <div class="fg"><label>详细描述</label><textarea id="na-desc" placeholder="风格要求、参考图、尺寸规格…"></textarea></div>
    <div class="frow">
      <div class="fg"><label>分类</label><select id="na-cat"></select></div>
      <div class="fg"><label>优先级</label><select id="na-prio"></select></div>
    </div>
    <div class="fg"><label>创建人</label><input id="na-by" placeholder="你的名字"/></div>
  </div>
  <div class="mf"><button class="btn bg" onclick="close_('mNewAsset')">取消</button><button class="btn bp" onclick="submitAsset()">创建资源</button></div>
</div></div>

<!-- 资源详情 -->
<div class="ov" id="mDetail"><div class="modal mlg">
  <div class="mh"><h3 id="dt-title">资源详情</h3><button class="mcl" onclick="close_('mDetail')">&#x2715;</button></div>
  <div class="mb" id="dt-body"></div>
  <div class="mf" id="dt-foot"></div>
</div></div>

<!-- 认领/审核 -->
<div class="ov" id="mAct"><div class="modal">
  <div class="mh"><h3 id="act-title">操作</h3><button class="mcl" onclick="close_('mAct')">&#x2715;</button></div>
  <div class="mb" id="act-body"></div>
  <div class="mf" id="act-foot"></div>
</div></div>

<!-- 删除确认 -->
<div class="ov" id="mDel"><div class="modal msm">
  <div class="mh"><h3>确认删除</h3><button class="mcl" onclick="close_('mDel')">&#x2715;</button></div>
  <div class="mb">
    <p style="font-size:14px;font-weight:600;margin-bottom:8px">&#9888; 此操作不可恢复</p>
    <p style="font-size:13px;color:var(--t2);line-height:1.6" id="del-msg"></p>
  </div>
  <div class="mf"><button class="btn bg" onclick="close_('mDel')">取消</button><button class="btn bd" onclick="doDel()">确认删除</button></div>
</div></div>

<!-- 快照操作确认 -->
<div class="ov" id="mSAct"><div class="modal msm">
  <div class="mh"><h3 id="sa-title">快照操作</h3><button class="mcl" onclick="close_('mSAct')">&#x2715;</button></div>
  <div class="mb"><p style="font-size:13px;color:var(--t2);line-height:1.7" id="sa-msg"></p></div>
  <div class="mf"><button class="btn bg" onclick="close_('mSAct')">取消</button><button class="btn bp" id="sa-btn">确认</button></div>
</div></div>

<!-- 快照对比 -->
<div class="ov" id="mDiff"><div class="modal mlg">
  <div class="mh"><h3>&#128202; 快照对比</h3><button class="mcl" onclick="close_('mDiff')">&#x2715;</button></div>
  <div class="mb" id="diff-body"></div>
  <div class="mf"><button class="btn bg" onclick="close_('mDiff')">关闭</button></div>
</div></div>

<!-- 项目配置 -->
<div class="ov" id="mCfg"><div class="modal">
  <div class="mh"><h3>&#9881; 项目配置 (project.yaml)</h3><button class="mcl" onclick="close_('mCfg')">&#x2715;</button></div>
  <div class="mb"><div class="fg"><label>配置内容（YAML）</label><textarea id="cfg-txt" style="min-height:320px;font-family:monospace;font-size:12px"></textarea></div></div>
  <div class="mf"><button class="btn bg" onclick="close_('mCfg')">取消</button><button class="btn bp" onclick="saveCfg()">保存配置</button></div>
</div></div>

<script>

var SL={pending:'待认领',in_review:'审核中',approved:'已通过',rejected:'已拒绝',changes_requested:'需修改'};
var cfg={},snaps=[],curSnap=null,curView='list',fSt='',fCat='';
var selIds=new Set(),pendDel=null;

async function init(){
  try{ await loadCfg(); await loadSnaps(); }
  catch(e){ document.getElementById('mc').innerHTML='<div class="ns"><p style="color:var(--danger)">加载失败: '+e.message+'</p></div>'; }
}

async function loadCfg(){
  cfg=await(await fetch('/api/config')).json();
  document.getElementById('pname').textContent=(cfg.project&&cfg.project.name)||'ArtHub';
  var cats=(cfg.review&&cfg.review.categories)||[];
  var prios=(cfg.review&&cfg.review.priorities)||[];
  document.getElementById('na-cat').innerHTML=cats.map(function(c){return'<option>'+c+'</option>';}).join('');
  document.getElementById('na-prio').innerHTML=prios.map(function(p){return'<option>'+p+'</option>';}).join('');
  document.getElementById('catBtns').innerHTML=
    '<button class="fb active" onclick="setCat(this,\'\')">全部</button>'+
    cats.map(function(c){return'<button class="fb" onclick="setCat(this,\''+c+'\')">'+c+'</button>';}).join('');
}

async function loadSnaps(){
  snaps=await(await fetch('/api/snapshots')).json();
  var active=snaps.filter(function(s){return!s.is_archived;});
  if(!curSnap&&active.length)curSnap=active[0].id;
  renderSbar();
  if(curSnap)await loadAssets(); else renderNoSnap();
}

function renderSbar(){
  var bar=document.getElementById('sbar');
  var active=snaps.filter(function(s){return!s.is_archived;});
  var arch=snaps.filter(function(s){return s.is_archived;});
  var inh=document.getElementById('ns-inh');
  if(inh)inh.innerHTML='<option value="">不继承（空快照）</option>'+
    active.map(function(s){return'<option value="'+s.id+'">'+s.version+(s.name?' - '+s.name:'')+'</option>';}).join('');

  var html=active.map(function(s){
    var st=s.stats||{};
    var pct=st.total>0?Math.round((st.approved/st.total)*100):0;
    var badges='';
    if(s.is_refining)badges+='<span class="badge br">完善中</span>';
    if(s.is_applied) badges+='<span class="badge ba">已应用</span>';
    if(!s.is_refining&&!s.is_applied)badges+='<span class="badge bl">只读</span>';
    var m='';
    if(!s.is_refining)m+='<div class="ddi warn" onclick="snapAct(\'refine\',\''+s.id+'\')">&#128295; 开始完善</div>';
    if(s.is_refining) m+='<div class="ddi" onclick="snapAct(\'stop-refine\',\''+s.id+'\')">&#9208; 停止完善</div>';
    if(!s.is_applied) m+='<div class="ddi ok" onclick="snapAct(\'apply\',\''+s.id+'\')">&#128640; 应用此快照</div>';
    m+='<div class="ddi" onclick="openDiff(\''+s.id+'\')">&#128202; 与其他快照对比</div>';
    return '<div class="sc'+(curSnap===s.id?' active':'')+'" onclick="selSnap(\''+s.id+'\')">'
      +'<button class="sc-mb" onclick="event.stopPropagation();toggleDD(\'dd-'+s.id+'\')">&#xB7;&#xB7;&#xB7;</button>'
      +'<div class="sc-ver">'+esc(s.version)+'</div>'
      +'<div class="sc-name">'+(s.name?esc(s.name):'&nbsp;')+'</div>'
      +'<div class="sc-badges">'+badges+'</div>'
      +'<div class="sc-prog"><div class="sc-fill" style="width:'+pct+'%"></div></div>'
      +'<div class="sc-cnt">'+( (st.total||0) )+'个资源 · 通过率'+pct+'%</div>'
      +'<div class="dd" id="dd-'+s.id+'">'+m+'</div>'
      +'</div>';
  }).join('');
  if(arch.length)html+='<div style="font-size:11px;color:var(--t3);padding:0 4px;flex-shrink:0;align-self:center">&#128230; 已归档'+arch.length+'个</div>';

}

function renderNoSnap(){
  document.getElementById('mc').innerHTML='<div class="ns"><p>还没有版本快照，创建第一个快照开始管理美术资源</p><button class="btn bp" onclick="open_(\'mNewSnap\')">&#65291; 创建第一个快照</button></div>';

function toggleDD(id){
  document.querySelectorAll('.dd').forEach(function(d){if(d.id!==id)d.style.display='none';});
  var el=document.getElementById(id);
  if(el)el.style.display=el.style.display==='block'?'none':'block';
}
document.addEventListener('click',function(e){if(!e.target.closest('.sc'))document.querySelectorAll('.dd').forEach(function(d){d.style.display='none';});});

async function selSnap(id){
  curSnap=id;selIds.clear();
  document.querySelectorAll('.dd').forEach(function(d){d.style.display='none';});
  renderSbar(); await loadAssets();
}

function snapAct(action,id){
  document.querySelectorAll('.dd').forEach(function(d){d.style.display='none';});
  var snap=snaps.find(function(s){return s.id===id;});
  var ver=snap?snap.version:id;
  var msgs={
    refine:'将快照 <strong>'+esc(ver)+'</strong> 设为「完善中」状态，可以对资源进行增删改操作。',
    'stop-refine':'停止完善快照 <strong>'+esc(ver)+'</strong>，资源将变为只读。',
    apply:'应用快照 <strong>'+esc(ver)+'</strong>，将触发 CI/CD 流程（如已配置），并发送飞书通知。<br><br>注意：超出3个活跃快照时，最旧的快照将自动归档。'
  };
  var titles={refine:'开始完善','stop-refine':'停止完善',apply:'应用快照'};
  document.getElementById('sa-title').textContent=titles[action]||action;
  document.getElementById('sa-msg').innerHTML=msgs[action]||'';
  var btn=document.getElementById('sa-btn');
  btn.className='btn '+(action==='apply'?'bs':action==='stop-refine'?'bg':'bp');
  btn.onclick=function(){doSnapAct(action,id);};
  open_('mSAct');
}

async function doSnapAct(action,id){
  close_('mSAct');
  var r=await fetch('/api/snapshots/'+id+'/'+action,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({actor:'用户'})});
  var d=await r.json();
  if(r.ok){
    var m={refine:'已开始完善','stop-refine':'已停止完善',apply:'快照已应用'+(d.triggered&&d.triggered.length?'，CI/CD 已触发':'')};
    toast(m[action]||'操作成功');
    await loadSnaps();
  } else toast('❌ '+(d.error||'操作失败'),true);
}

async function openDiff(sid){
  document.querySelectorAll('.dd').forEach(function(d){d.style.display='none';});
  var others=snaps.filter(function(s){return s.id!==sid&&!s.is_archived;});
  if(!others.length){toast('没有其他快照可对比',true);return;}
  var otherId=others[0].id;
  var r=await fetch('/api/snapshots/'+sid+'/diff/'+otherId);
  var d=await r.json();
  var sv=snaps.find(function(s){return s.id===sid;});
  var ov=snaps.find(function(s){return s.id===otherId;});
  var html='<p style="font-size:13px;color:var(--t2);margin-bottom:14px">对比 <strong>'+(sv?sv.version:'?')+'</strong> vs <strong>'+(ov?ov.version:'?')+'</strong></p>';
  if(d.added&&d.added.length)html+='<div class="dsec"><h4>新增 ('+d.added.length+')</h4>'+d.added.map(function(a){return'<div style="padding:3px 0;font-size:13px;color:var(--success)">+ '+esc(a.name)+'</div>';}).join('')+'</div>';
  if(d.removed&&d.removed.length)html+='<div class="dsec"><h4>移除 ('+d.removed.length+')</h4>'+d.removed.map(function(a){return'<div style="padding:3px 0;font-size:13px;color:var(--danger)">- '+esc(a.name)+'</div>';}).join('')+'</div>';
  if(d.changed&&d.changed.length)html+='<div class="dsec"><h4>状态变化 ('+d.changed.length+')</h4>'+d.changed.map(function(c){return'<div style="padding:4px 0;font-size:13px;border-bottom:1px solid var(--border)">'+esc(c.name)+' <span style="color:var(--t3)">→</span> <span class="tag t-'+c.from.status+'">'+SL[c.from.status]+'</span> &#8594; <span class="tag t-'+c.to.status+'">'+SL[c.to.status]+'</span></div>';}).join('')+'</div>';
  if(!d.added.length&&!d.removed.length&&!d.changed.length)html+='<p style="color:var(--t3);text-align:center;padding:20px">两个快照资源完全相同</p>';
  document.getElementById('diff-body').innerHTML=html;
  open_('mDiff');
}

async function submitSnap(){
  var ver=document.getElementById('ns-ver').value.trim();
  if(!ver){toast('请填写版本号',true);return;}
  var r=await fetch('/api/snapshots',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    version:ver,
    name:document.getElementById('ns-name').value.trim(),
    created_by:document.getElementById('ns-by').value.trim(),
    inherit_from:document.getElementById('ns-inh').value||undefined
  })});
  var d=await r.json();
  if(r.ok){
    close_('mNewSnap');
    ['ns-ver','ns-name','ns-by'].forEach(function(id){document.getElementById(id).value='';});
    toast('快照已创建'); curSnap=d.id; await loadSnaps();
  } else toast('❌ '+(d.error||'创建失败'),true);

async function loadAssets(){
  if(!curSnap){renderNoSnap();return;}
  var snap=snaps.find(function(s){return s.id===curSnap;});
  var p=new URLSearchParams();
  if(fSt)p.set('status',fSt);
  if(fCat)p.set('category',fCat);
  var assets=await(await fetch('/api/snapshots/'+curSnap+'/assets?'+p)).json();
  var mc=document.getElementById('mc');
  var isRef=snap&&snap.is_refining;
  var rob=!isRef?'<div class="rob">&#128274; 此快照为只读状态（非「完善中」），资源不可修改。点击快照的 ··· 菜单可开始完善。</div>':'';
  var addBtn=isRef?'<button class="btn bp" onclick="open_(\'mNewAsset\')">&#65291; 添加资源</button>':'';
  var delBatch=isRef?'<button class="btn bd" style="padding:4px 10px;font-size:12px" onclick="batchDel()">&#128465; 批量删除</button>':'';
  mc.innerHTML=rob
    +'<div class="ltop"><h2>'+(snap?esc(snap.version):'快照')+' <span style="color:var(--t2);font-weight:400">· '+assets.length+'个资源</span></h2>'
    +'<div style="display:flex;gap:7px;align-items:center">'
    +'<button class="vbtn'+(curView==='list'?' on':'')+'" onclick="setView(\'list\')">&#9776; 列表</button>'
    +'<button class="vbtn'+(curView==='kanban'?' on':'')+'" onclick="setView(\'kanban\')">&#9632; 看板</button>'
    +addBtn+'</div></div>'
    +'<div class="bbr" id="bbr"><span id="bbc">已选 0 个</span>'
    +'<button class="btn bg" style="padding:4px 10px;font-size:12px" onclick="batchUpd(\'priority\',\'紧急\')">&#128308; 标为紧急</button>'
    +'<button class="btn bg" style="padding:4px 10px;font-size:12px" onclick="batchUpd(\'priority\',\'高\')">&#128992; 标为高</button>'
    +delBatch
    +'<button class="btn bg" style="padding:4px 10px;font-size:12px;margin-left:auto" onclick="clrSel()">&#x2715; 取消</button></div>'
    +'<div id="alist"></div>';
  if(curView==='list')renderList(assets,isRef); else renderKanban(assets,isRef);
}

function renderList(assets,isRef){
  var el=document.getElementById('alist');
  if(!assets.length){el.innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:10px">&#128237;</div><p>暂无资源</p></div>';return;}
  el.innerHTML=assets.map(function(a){
    var del=isRef&&a.status==='pending'?'<button class="bdel" onclick="askDel(event,\''+a.id+'\',\''+esc(a.name)+'\')">&#128465;</button>':'';
    var chk=isRef?'<input type="checkbox" class="ck" onclick="event.stopPropagation();togSel(\''+a.id+'\',this)">':'';
    return '<div class="ac" onclick="openDetail(\''+a.id+'\')"><div class="act">'+chk
      +'<div class="acn">'+esc(a.name)+'</div>'
      +'<div class="acr">'+del+'<span class="tag t-'+a.status+'">'+( SL[a.status]||a.status )+'</span></div></div>'
      +'<div class="acm"><span>&#128193; '+(a.category||'其他')+'</span><span class="p'+(a.priority||'')+'">&#128293; '+(a.priority||'中')+'</span>'
      +'<span>'+(a.assignee?'&#128100; '+esc(a.assignee):'未认领')+'</span></div></div>';
  }).join('');
}

function renderKanban(assets,isRef){
  var cols=[['pending','待认领','dp'],['in_review','审核中','dr'],['changes_requested','需修改','dc'],['approved','已通过','dok'],['rejected','已拒绝','dej']];
  var g={};cols.forEach(function(c){g[c[0]]=[];});
  assets.forEach(function(a){if(g[a.status])g[a.status].push(a);});
  document.getElementById('alist').innerHTML='<div class="kb">'+cols.map(function(c){
    var k=c[0],lb=c[1],dc=c[2];
    var cards=g[k].map(function(a){
      return '<div class="kk" onclick="openDetail(\''+a.id+'\')">'
        +'<div class="kkn">'+esc(a.name)+'</div>'
        +'<div class="kkm"><span>&#128193;'+esc(a.category||'')+'</span><span class="p'+(a.priority||'')+'">&#128293;'+(a.priority||'中')+'</span>'
        +(a.assignee?'<span>&#128100;'+esc(a.assignee)+'</span>':'')
        +(isRef&&k==='pending'?'<span style="color:var(--danger);cursor:pointer" onclick="event.stopPropagation();askDel(event,\''+a.id+'\',\''+esc(a.name)+'\')">&#128465;</span>':'')
        +'</div></div>';
    }).join('');
    return '<div class="kc"><div class="kch"><span><span class="dot '+dc+'" style="display:inline-block;width:7px;height:7px;margin-right:5px"></span>'+lb+'</span>'
      +'<span style="background:var(--bg);padding:2px 7px;border-radius:10px;font-size:11px">'+g[k].length+'</span></div>'
      +'<div class="kcb">'+(cards||'<div style="color:var(--t3);text-align:center;font-size:12px;padding:16px">暂无</div>')+'</div></div>';
  }).join('')+'</div>';
}

function setView(v){curView=v;loadAssets();}
function setStatus(btn,v){fSt=v;document.querySelectorAll('.sidebar .fb').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');loadAssets();}
function setCat(btn,v){fCat=v;document.querySelectorAll('#catBtns .fb').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');loadAssets();}

function togSel(id,cb){if(cb.checked)selIds.add(id);else selIds.delete(id);updBbr();}
function clrSel(){selIds.clear();document.querySelectorAll('.ck').forEach(function(c){c.checked=false;});updBbr();}
function updBbr(){
  var bar=document.getElementById('bbr');if(!bar)return;
  var n=selIds.size;
  document.getElementById('bbc').textContent='已选 '+n+' 个';
  if(n>0)bar.classList.add('show');else bar.classList.remove('show');
}
async function batchUpd(field,val){
  if(!selIds.size)return;
  var r=await fetch('/api/assets/batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:[...selIds],action:'update',data:{[field]:val}})});
  var d=await r.json();
  if(r.ok){clrSel();toast('已更新 '+d.processed+' 个');loadAssets();}
  else toast('❌ '+(d.error||'失败'),true);
}
async function batchDel(){
  if(!selIds.size)return;
  pendDel=[...selIds];
  document.getElementById('del-msg').innerHTML='将删除已选的 <strong>'+selIds.size+' 个</strong>资源（仅删除待认领状态的，其余跳过）';
  open_('mDel');
}

function askDel(e,id,name){
  e.stopPropagation();pendDel=id;
  document.getElementById('del-msg').innerHTML='将删除资源：<strong>「'+esc(name)+'」</strong><br>只有「待认领」状态可以删除。';
  open_('mDel');
}
async function doDel(){
  if(!pendDel)return;close_('mDel');
  if(Array.isArray(pendDel)){
    var r=await fetch('/api/assets/batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:pendDel,action:'delete'})});
    var d=await r.json();
    if(r.ok){clrSel();toast('删除 '+d.processed+' 个，跳过 '+d.skipped+' 个');loadAssets();}
    else toast('❌ '+(d.error||'失败'),true);
  } else {
    var r=await fetch('/api/assets/'+pendDel,{method:'DELETE'});
    var d=await r.json();
    if(r.ok){toast('已删除');loadAssets();}
    else toast('❌ '+(d.error||'删除失败'),true);
  }
  pendDel=null;
}

async function submitAsset(){
  var name=document.getElementById('na-name').value.trim();
  if(!name){toast('请填写资源名称',true);return;}
  if(!curSnap){toast('请先选择快照',true);return;}
  var r=await fetch('/api/snapshots/'+curSnap+'/assets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    name:name,description:document.getElementById('na-desc').value.trim(),
    category:document.getElementById('na-cat').value,

    created_by:document.getElementById('na-by').value.trim()
  })});

  else toast('❌ '+(d.error||'创建失败'),true);
}

async function upFile(aid,input){

}
async function doReview(id){
  var r=await fetch('/api/assets/'+id+'/review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reviewer:document.getElementById('rv-n').value,status:document.getElementById('rv-s').value,comment:document.getElementById('rv-c').value.trim()})});
  var d=await r.json();
  if(r.ok){close_('mAct');toast('审核已提交');loadAssets();}else toast('❌ '+(d.error||'提交失败'),true);
}

async function sendCmt(aid){
  var ct=document.getElementById('cmt-ct').value.trim();
  if(!ct){toast('请填写评论内容',true);return;}
  var r=await fetch('/api/assets/'+aid+'/comments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({author:document.getElementById('cmt-au').value,content:ct})});
  if(r.ok){document.getElementById('cmt-ct').value='';openDetail(aid);}else toast('❌ 发送失败',true);
}
async function delCmt(aid,cid){
  var r=await fetch('/api/assets/'+aid+'/comments/'+cid,{method:'DELETE'});
  if(r.ok)openDetail(aid);else toast('❌ 删除失败',true);
}

async function openCfg(){
  var txt=await(await fetch('/api/config/project')).text();
  document.getElementById('cfg-txt').value=txt;open_('mCfg');
}
async function saveCfg(){
  var r=await fetch('/api/config/project/raw',{method:'PUT',headers:{'Content-Type':'text/plain'},body:document.getElementById('cfg-txt').value});
  if(r.ok){close_('mCfg');toast('配置已保存');loadCfg();}else toast('❌ 保存失败',true);
}

function open_(id){document.getElementById(id).classList.add('open');}
function close_(id){document.getElementById(id).classList.remove('open');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtD(s){if(!s)return'—';var d=new Date(s);return isNaN(d)?s:d.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}
function toast(msg,err){
  var w=document.getElementById('tw');var el=document.createElement('div');
  el.className='toast'+(err?' err':'');el.textContent=msg;w.appendChild(el);
  setTimeout(function(){el.remove();},3200);
}
document.querySelectorAll('.ov').forEach(function(o){o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('open');});});
init();


</script>
</body></html>
