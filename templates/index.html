<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ArtHub - 美术资源审核平台</title>
<style>
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#242838;--border:#2d3148;--accent:#5b6af0;--accent-h:#7280ff;--danger:#e05252;--success:#4caf82;--warn:#e0a040;--purple:#b06af0;--text:#e2e4f0;--text2:#8890b0;--text3:#5a6080;--r:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:200;}
.logo{font-size:17px;font-weight:700;color:var(--accent);}
.proj-name{font-size:13px;color:var(--text2);border-left:1px solid var(--border);padding-left:12px;margin-left:12px;}
.topbar-l{display:flex;align-items:center;}
.topbar-r{display:flex;gap:8px;}
.snapshot-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:10px;overflow-x:auto;flex-shrink:0;min-height:80px;}
.snap-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;min-width:175px;cursor:pointer;transition:border-color .15s;position:relative;flex-shrink:0;}
.snap-card:hover{border-color:var(--accent);}.snap-card.active{border-color:var(--accent);background:rgba(91,106,240,.1);}
.snap-ver{font-size:14px;font-weight:700;margin-bottom:3px;}
.snap-name{font-size:11px;color:var(--text3);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.snap-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;}
.badge-refining{background:rgba(224,160,64,.2);color:var(--warn);}
.badge-applied{background:rgba(76,175,130,.2);color:var(--success);}
.badge-archived{background:rgba(90,96,128,.2);color:var(--text3);}
.snap-progress{height:3px;background:var(--border);border-radius:2px;margin-top:5px;}
.snap-progress-fill{height:3px;background:var(--success);border-radius:2px;}
.snap-count{font-size:10px;color:var(--text3);margin-top:3px;}
.snap-menu-btn{position:absolute;top:8px;right:6px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;}
.snap-menu-btn:hover{background:var(--border);color:var(--text);}
.snap-add{background:transparent;border:1px dashed var(--border);border-radius:var(--r);padding:10px 16px;min-width:110px;cursor:pointer;color:var(--text3);font-size:13px;transition:all .15s;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:5px;}
.snap-add:hover{border-color:var(--accent);color:var(--accent);}
.dropdown{position:absolute;top:100%;right:0;margin-top:4px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);min-width:130px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:400;}
.dropdown-item{padding:8px 13px;font-size:13px;cursor:pointer;transition:background .1s;white-space:nowrap;}
.dropdown-item:hover{background:var(--bg3);}.dropdown-item.success{color:var(--success);}.dropdown-item.warn{color:var(--warn);}.dropdown-item.danger{color:var(--danger);}
.layout{display:flex;flex:1;min-height:0;}
.sidebar{width:178px;min-width:178px;background:var(--bg2);border-right:1px solid var(--border);padding:12px 10px;overflow-y:auto;flex-shrink:0;}
.sidebar h4{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:0 4px 7px;}
.fb{display:flex;align-items:center;gap:6px;width:100%;padding:6px 10px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-size:13px;cursor:pointer;text-align:left;transition:all .15s;margin-bottom:2px;}
.fb:hover{background:var(--bg3);color:var(--text);}.fb.active{background:rgba(91,106,240,.15);color:var(--accent);}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.d-all{background:var(--text3);}.d-pend{background:var(--text2);}.d-rev{background:var(--warn);}.d-ok{background:var(--success);}.d-rej{background:var(--danger);}.d-chg{background:var(--purple);}
.sep{height:1px;background:var(--border);margin:8px 0;}
.content{flex:1;overflow-y:auto;padding:16px 20px;}
.readonly-banner{background:rgba(90,96,128,.08);border:1px solid var(--border);border-radius:var(--r);padding:8px 14px;font-size:12px;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.list-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.list-top h2{font-size:14px;font-weight:600;}
.list-top-r{display:flex;gap:7px;align-items:center;}
.vbtn{padding:5px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;}
.vbtn:hover,.vbtn.active{background:var(--bg3);color:var(--text);border-color:var(--accent);}
.batch-bar{background:var(--bg3);border:1px solid var(--accent);border-radius:var(--r);padding:7px 12px;margin-bottom:10px;display:none;align-items:center;gap:10px;font-size:13px;}
.batch-bar.show{display:flex;}
.ac{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.ac:hover{border-color:var(--accent);}
.ac-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.ac-name{font-size:14px;font-weight:600;flex:1;}
.ac-right{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.ac-meta{display:flex;gap:9px;margin-top:6px;font-size:12px;color:var(--text3);flex-wrap:wrap;}
.ac-check{width:15px;height:15px;cursor:pointer;flex-shrink:0;margin-top:2px;}
.tag{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;}
.tag-pending{background:rgba(136,144,176,.15);color:var(--text2);}
.tag-in_review{background:rgba(224,160,64,.15);color:var(--warn);}
.tag-approved{background:rgba(76,175,130,.15);color:var(--success);}
.tag-rejected{background:rgba(224,82,82,.15);color:var(--danger);}
.tag-changes_requested{background:rgba(176,106,240,.15);color:var(--purple);}
.prio-紧急{color:var(--danger);}.prio-高{color:var(--warn);}.prio-中{color:var(--text2);}.prio-低{color:var(--text3);}
.btn-del{padding:3px 8px;border-radius:5px;border:1px solid rgba(224,82,82,.35);background:transparent;color:var(--danger);font-size:11px;cursor:pointer;transition:all .15s;}
.btn-del:hover{background:rgba(224,82,82,.15);}
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;min-height:400px;}
.kc{width:220px;min-width:220px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;}
.kc-head{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;}
.kc-body{flex:1;overflow-y:auto;padding:7px;}
.kk{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 11px;margin-bottom:6px;cursor:pointer;font-size:13px;transition:border-color .15s;}
.kk:hover{border-color:var(--accent);}
.kk-name{font-weight:600;margin-bottom:4px;}
.kk-meta{font-size:11px;color:var(--text3);display:flex;gap:6px;flex-wrap:wrap;}
.empty{text-align:center;padding:50px 20px;color:var(--text3);}
.empty .ico{font-size:40px;margin-bottom:10px;}
.no-snap{text-align:center;padding:60px 20px;color:var(--text3);}
.no-snap .ico{font-size:48px;margin-bottom:14px;}
.no-snap p{margin-bottom:16px;font-size:14px;}
.btn{padding:7px 14px;border-radius:6px;border:none;font-size:13px;cursor:pointer;transition:all .15s;font-weight:500;}
.btn-prim{background:var(--accent);color:#fff;}.btn-prim:hover{background:var(--accent-h);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}.btn-ghost:hover{background:var(--bg3);color:var(--text);}
.btn-danger{background:var(--danger);color:#fff;}.btn-success{background:var(--success);color:#fff;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center;}
.ov.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:520px;max-width:96vw;max-height:88vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.5);}
.modal-lg{width:700px;}.modal-sm{width:400px;}
.mh{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.mh h3{font-size:15px;font-weight:600;}
.mclose{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;}.mclose:hover{color:var(--text);}
.mb{padding:16px 20px;}.mf{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500;}
.fg input,.fg textarea,.fg select{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:inherit;transition:border-color .15s;}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--accent);}
.fg textarea{resize:vertical;min-height:70px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.kv{display:grid;grid-template-columns:90px 1fr;gap:4px 10px;font-size:13px;margin-bottom:14px;}
.kv .k{color:var(--text3);}.kv .v{color:var(--text);}
.dsec{margin-bottom:16px;}.dsec h4{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.file-strip{display:flex;gap:8px;overflow-x:auto;padding:4px 0;}
.file-thumb{width:80px;height:80px;border-radius:6px;border:1px solid var(--border);overflow:hidden;flex-shrink:0;cursor:pointer;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;font-size:10px;color:var(--text3);text-align:center;padding:4px;}
.file-thumb img{width:100%;height:100%;object-fit:cover;}
.file-thumb:hover{border-color:var(--accent);}
.rvc{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 11px;margin-bottom:6px;}
.rvc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;font-size:12px;}
.rvc-cmt{font-size:13px;color:var(--text2);}
.cmt-item{display:flex;gap:8px;margin-bottom:8px;}
.cmt-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cmt-body{flex:1;}
.cmt-meta{font-size:11px;color:var(--text3);margin-bottom:2px;display:flex;gap:6px;align-items:center;}
.cmt-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;}.cmt-del:hover{color:var(--danger);}
.cmt-content{font-size:13px;color:var(--text2);line-height:1.5;}
.cmt-input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px;}
.cmt-row{display:flex;gap:8px;margin-top:8px;}
.cmt-row select{padding:7px 9px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;}
.cmt-row textarea{flex:1;min-height:50px;resize:vertical;padding:7px 9px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:13px;font-family:inherit;}
.cmt-row textarea:focus,.cmt-row select:focus{outline:none;border-color:var(--accent);}
.img-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;display:none;align-items:center;justify-content:center;cursor:zoom-out;}
.img-overlay.open{display:flex;}
.img-overlay img{max-width:90vw;max-height:90vh;border-radius:6px;}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px;}
.toast{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:fin .2s;}
.toast.err{border-color:var(--danger);color:var(--danger);}
@keyframes fin{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.act-item{font-size:12px;color:var(--text3);padding:3px 0;border-bottom:1px solid var(--border);}
.act-item:last-child{border-bottom:none;}
.diff-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.diff-row:last-child{border-bottom:none;}
.diff-arrow{color:var(--text3);font-size:16px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-l">
    <div class="logo">🎨 ArtHub</div>
    <div class="proj-name" id="projName">加载中…</div>
  </div>
  <div class="topbar-r">
    <button class="btn btn-ghost" onclick="openCfg()">⚙️ 项目配置</button>
  </div>
</div>
<div class="snapshot-bar" id="snapshotBar"><div style="color:var(--text3);font-size:13px;">加载中…</div></div>
<div class="layout">
  <div class="sidebar">
    <h4>资源状态</h4>
    <button class="fb active" onclick="setStatus(this,'')"><span class="dot d-all"></span>全部</button>
    <button class="fb" onclick="setStatus(this,'pending')"><span class="dot d-pend"></span>待认领</button>
    <button class="fb" onclick="setStatus(this,'in_review')"><span class="dot d-rev"></span>审核中</button>
    <button class="fb" onclick="setStatus(this,'approved')"><span class="dot d-ok"></span>已通过</button>
    <button class="fb" onclick="setStatus(this,'rejected')"><span class="dot d-rej"></span>已拒绝</button>
    <button class="fb" onclick="setStatus(this,'changes_requested')"><span class="dot d-chg"></span>需修改</button>
    <div class="sep"></div>
    <h4>分类</h4>
    <div id="catBtns"></div>
  </div>
  <div class="content" id="mainContent"></div>
</div>
<div class="toast-wrap" id="toastWrap"></div>
<div class="img-overlay" id="imgOverlay" onclick="closeImgOverlay()"><img id="imgOverlayImg" src="" alt=""/></div>

<!-- 新建快照 -->
<div class="ov" id="newSnapModal">
  <div class="modal">
    <div class="mh"><h3>📸 新建版本快照</h3><button class="mclose" onclick="close_('newSnapModal')">✕</button></div>
    <div class="mb">
      <div class="fg"><label>版本号 *</label><input id="ns-ver" placeholder="如：v1.0、v2、2026-03-11"/></div>
      <div class="fg"><label>快照名称</label><input id="ns-name" placeholder="如：UI完善版、首发资源包"/></div>
      <div class="fg"><label>创建人</label><input id="ns-creator" placeholder="你的名字"/></div>
      <div class="fg">
        <label>继承自</label>
        <select id="ns-inherit"><option value="">不继承（空快照）</option></select>
        <div style="font-size:11px;color:var(--text3);margin-top:4px;">继承时复制该快照所有资源（状态重置为待认领），方便在上一版基础上迭代</div>
      </div>
    </div>
    <div class="mf">
      <button class="btn btn-ghost" onclick="close_('newSnapModal')">取消</button>
      <button class="btn btn-prim" onclick="submitNewSnap()">创建快照</button>
    </div>
  </div>
</div>

<!-- 新建资源 -->
<div class="ov" id="newAssetModal">
  <div class="modal">
    <div class="mh"><h3>＋ 新建资源</h3><button class="mclose" onclick="close_('newAssetModal')">✕</button></div>
    <div class="mb">
      <div class="fg"><label>资源名称 *</label><input id="na-name" placeholder="如：火焰法师-稀有卡"/></div>
      <div class="fg"><label>详细描述</label><textarea id="na-desc" placeholder="风格要求、参考图、尺寸规格…"></textarea></div>
      <div class="frow">
        <div class="fg"><label>分类</label><select id="na-cat"></select></div>
        <div class="fg"><label>优先级</label><select id="na-prio"></select></div>
      </div>
      <div class="fg"><label>创建人</label><input id="na-creator" placeholder="你的名字"/></div>
    </div>
    <div class="mf">
      <button class="btn btn-ghost" onclick="close_('newAssetModal')">取消</button>
      <button class="btn btn-prim" onclick="submitNewAsset()">创建资源</button>
    </div>
  </div>
</div>

<!-- 资源详情 -->
<div class="ov" id="detailModal">
  <div class="modal modal-lg">
    <div class="mh"><h3 id="d-title">资源详情</h3><button class="mclose" onclick="close_('detailModal')">✕</button></div>
    <div class="mb" id="d-body"></div>
    <div class="mf" id="d-footer"></div>
  </div>
</div>

<!-- 认领/审核 -->
<div class="ov" id="actModal">
  <div class="modal">
    <div class="mh"><h3 id="am-title">操作</h3><button class="mclose" onclick="close_('actModal')">✕</button></div>
    <div class="mb" id="am-body"></div>
    <div class="mf" id="am-footer"></div>
  </div>
</div>

<!-- 删除确认 -->
<div class="ov" id="delModal">
  <div class="modal modal-sm">
    <div class="mh"><h3>确认删除</h3><button class="mclose" onclick="close_('delModal')">✕</button></div>
    <div class="mb">
      <p style="font-size:14px;font-weight:600;margin-bottom:8px;">⚠️ 此操作不可恢复</p>
      <p style="font-size:13px;color:var(--text2);line-height:1.6;" id="del-msg"></p>
    </div>
    <div class="mf">
      <button class="btn btn-ghost" onclick="close_('delModal')">取消</button>
      <button class="btn btn-danger" onclick="doDelete()">确认删除</button>
    </div>
  </div>
</div>

<!-- 快照操作确认 -->
<div class="ov" id="snapActModal">
  <div class="modal modal-sm">
    <div class="mh"><h3 id="sa-title">快照操作</h3><button class="mclose" onclick="close_('snapActModal')">✕</button></div>
    <div class="mb"><p style="font-size:13px;color:var(--text2);line-height:1.7;" id="sa-msg"></p></div>
    <div class="mf">
      <button class="btn btn-ghost" onclick="close_('snapActModal')">取消</button>
      <button class="btn btn-prim" id="sa-btn">确认</button>
    </div>
  </div>
</div>

<!-- 快照对比 -->
<div class="ov" id="diffModal">
  <div class="modal modal-lg">
    <div class="mh"><h3>📊 快照对比</h3><button class="mclose" onclick="close_('diffModal')">✕</button></div>
    <div class="mb" id="diff-body"></div>
    <div class="mf"><button class="btn btn-ghost" onclick="close_('diffModal')">关闭</button></div>
  </div>
</div>

<!-- 项目配置 -->
<div class="ov" id="cfgModal">
  <div class="modal">
    <div class="mh"><h3>⚙️ 项目配置（project.yaml）</h3><button class="mclose" onclick="close_('cfgModal')">✕</button></div>
    <div class="mb">
      <p style="font-size:12px;color:var(--text2);margin-bottom:10px;">填写后平台即绑定至对应游戏项目</p>
      <div class="fg"><label>配置内容（YAML）</label><textarea id="cfg-txt" style="min-height:320px;font-family:monospace;font-size:12px;"></textarea></div>
    </div>
    <div class="mf">
      <button class="btn btn-ghost" onclick="close_('cfgModal')">取消</button>
      <button class="btn btn-prim" onclick="saveCfg()">保存配置</button>
    </div>
  </div>
</div>

<script>
const SL={pending:'待认领',in_review:'审核中',approved:'已通过',rejected:'已拒绝',changes_requested:'需修改'};
const SC={pending:'#8890b0',in_review:'#e0a040',approved:'#4caf82',rejected:'#e05252',changes_requested:'#b06af0'};
let cfg={},snapshots=[],curSnapId=null,curView='list',fStatus='',fCat='';
let selectedIds=new Set(),pendingDelId=null,curDetailId=null;

async function init(){
  await loadCfg();
  await loadSnapshots();
}

async function loadCfg(){
  cfg=await(await fetch('/api/config')).json();
  document.getElementById('projName').textContent=cfg.project?.name||'ArtHub';
  const cats=cfg.review?.categories||[];
  const prios=cfg.review?.priorities||[];
  document.getElementById('na-cat').innerHTML=cats.map(c=>`<option>${c}</option>`).join('');
  document.getElementById('na-prio').innerHTML=prios.map(p=>`<option>${p}</option>`).join('');
  document.getElementById('catBtns').innerHTML=
    `<button class="fb active" onclick="setCat(this,'')">全部</button>`+
    cats.map(c=>`<button class="fb" onclick="setCat(this,'${c}')">${c}</button>`).join('');
}

async function loadSnapshots(){
  snapshots=await(await fetch('/api/snapshots')).json();
  const active=snapshots.filter(s=>!s.is_archived);
  if(!curSnapId&&active.length) curSnapId=active[0].id;
  renderSnapshotBar();
  if(curSnapId) await loadAssets();
  else renderNoSnap();
}

function renderSnapshotBar(){
  const bar=document.getElementById('snapshotBar');
  const active=snapshots.filter(s=>!s.is_archived);
  const archived=snapshots.filter(s=>s.is_archived);
  // 继承选项
  const inh=document.getElementById('ns-inherit');
  if(inh) inh.innerHTML=`<option value="">不继承（空快照）</option>`+
    active.map(s=>`<option value="${s.id}">${s.version}${s.name?' - '+s.name:''}</option>`).join('');

  let html=active.map(s=>{
    const st=s.stats||{};
    const pct=st.total>0?Math.round((st.approved/st.total)*100):0;
    const badges=[];
    if(s.is_refining) badges.push(`<span class="badge badge-refining">完善中</span>`);
    if(s.is_applied) badges.push(`<span class="badge badge-applied">已应用</span>`);
    if(!s.is_refining&&!s.is_applied) badges.push(`<span class="badge" style="background:rgba(90,96,128,.15);color:var(--text3)">只读</span>`);
    return `<div class="snap-card${curSnapId===s.id?' active':''}" onclick="selectSnap('${s.id}')">
      <button class="snap-menu-btn" onclick="event.stopPropagation();toggleSnapMenu('menu-${s.id}')">···</button>
      <div class="snap-ver">${esc(s.version)}</div>
      ${s.name?`<div class="snap-name">${esc(s.name)}</div>`:'<div class="snap-name" style="height:14px"></div>'}
      <div class="snap-badges">${badges.join('')}</div>
      <div class="snap-progress"><div class="snap-progress-fill" style="width:${pct}%"></div></div>
      <div class="snap-count">${st.total||0}个资源 · 通过率${pct}%</div>
      <div class="dropdown" id="menu-${s.id}" style="display:none">
        ${!s.is_refining?`<div class="dropdown-item warn" onclick="snapAct('refine','${s.id}','${esc(s.version)}')">🔧 开始完善</div>`:''}
        ${s.is_refining?`<div class="dropdown-item" onclick="snapAct('stop-refine','${s.id}','${esc(s.version)}')">⏸ 停止完善</div>`:''}
        ${!s.is_applied?`<div class="dropdown-item success" onclick="snapAct('apply','${s.id}','${esc(s.version)}')">🚀 应用此快照</div>`:''}
        <div class="dropdown-item" onclick="openDiff('${s.id}')">📊 与其他快照对比</div>
      </div>
    </div>`;
  }).join('');
  if(archived.length) html+=`<div style="font-size:11px;color:var(--text3);padding:0 4px;flex-shrink:0;align-self:center">📦 已归档${archived.length}个</div>`;
  html+=`<button class="snap-add" onclick="openNewSnap()">＋ 新建快照</button>`;
  bar.innerHTML=html;
}

function renderNoSnap(){
  document.getElementById('mainContent').innerHTML=`<div class="no-snap">
    <div class="ico">📸</div>
    <p>还没有版本快照，创建第一个快照开始管理美术资源</p>
    <button class="btn btn-prim" onclick="openNewSnap()">＋ 创建第一个快照</button>
  </div>`;
}

async function selectSnap(id){
  curSnapId=id;
  selectedIds.clear();
  closeAllDropdowns();
  renderSnapshotBar();
  await loadAssets();
}

function toggleSnapMenu(menuId){
  closeAllDropdowns();
  const el=document.getElementById(menuId);
  if(el) el.style.display=el.style.display==='none'?'block':'none';
}
function closeAllDropdowns(){
  document.querySelectorAll('.dropdown').forEach(d=>d.style.display='none');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.snap-card')) closeAllDropdowns();
});

// ── 快照操作 ──
function snapAct(action,id,version){
  closeAllDropdowns();
  const msgs={
    'refine':`将快照 <strong>${version}</strong> 设为「完善中」状态，可以对资源进行修改。`,
    'stop-refine':`停止完善快照 <strong>${version}</strong>，资源将变为只读。`,
    'apply':`应用快照 <strong>${version}</strong>，将触发 CI/CD 流程（如已配置），并发送飞书通知。<br><br>注意：超出3个活跃快照时，最旧的快照将自动归档。`
  };
  const titles={'refine':'开始完善','stop-refine':'停止完善','apply':'🚀 应用快照'};
  document.getElementById('sa-title').textContent=titles[action]||action;
  document.getElementById('sa-msg').innerHTML=msgs[action]||'';
  const btn=document.getElementById('sa-btn');
  btn.className='btn '+(action==='apply'?'btn-success':action==='stop-refine'?'btn-ghost':'btn-prim');
  btn.onclick=()=>doSnapAct(action,id);
  open_('snapActModal');
}

async function doSnapAct(action,id){
  close_('snapActModal');
  const r=await fetch(`/api/snapshots/${id}/${action}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({actor:'用户'})});
  const d=await r.json();
  if(r.ok){
    const msgs={'refine':'✅ 已开始完善','stop-refine':'⏸ 已停止完善','apply':'🚀 快照已应用'+(d.triggered?.length?'，CI/CD 已触发':'')};
    toast(msgs[action]||'✅ 操作成功');
    await loadSnapshots();
  } else toast('❌ '+(d.error||'操作失败'),true);
}

// ── 快照对比 ──
async function openDiff(sid){
  closeAllDropdowns();
  const others=snapshots.filter(s=>s.id!==sid&&!s.is_archived);
  if(!others.length){toast('没有其他快照可对比',true);return;}
  const otherId=others[0].id;
  const r=await fetch(`/api/snapshots/${sid}/diff/${otherId}`);
  const d=await r.json();
  const sv=snapshots.find(s=>s.id===sid);
  const ov=snapshots.find(s=>s.id===otherId);
  let html=`<p style="font-size:13px;color:var(--text2);margin-bottom:14px;">对比 <strong>${sv?.version}</strong> vs <strong>${ov?.version}</strong></p>`;
  if(d.added?.length){
    html+=`<div class="dsec"><h4>新增资源（${d.added.length}）</h4>`+d.added.map(a=>`<div style="padding:4px 0;font-size:13px;color:var(--success)">＋ ${esc(a.name)}</div>`).join('')+'</div>';
  }
  if(d.removed?.length){
    html+=`<div class="dsec"><h4>移除资源（${d.removed.length}）</h4>`+d.removed.map(a=>`<div style="padding:4px 0;font-size:13px;color:var(--danger)">－ ${esc(a.name)}</div>`).join('')+'</div>';
  }
  if(d.changed?.length){
    html+=`<div class="dsec"><h4>状态变化（${d.changed.length}）</h4>`+d.changed.map(c=>`
      <div class="diff-row">
        <span>${esc(c.name)}</span>
        <span class="diff-arrow">→</span>
        <span><span class="tag tag-${c.from.status}">${SL[c.from.status]||c.from.status}</span> → <span class="tag tag-${c.to.status}">${SL[c.to.status]||c.to.status}</span></span>
      </div>`).join('')+'</div>';
  }
  if(!d.added?.length&&!d.removed?.length&&!d.changed?.length) html+=`<p style="color:var(--text3);text-align:center;padding:20px">两个快照资源完全相同</p>`;
  document.getElementById('diff-body').innerHTML=html;
  open_('diffModal');
}

// ── 新建快照 ──
function openNewSnap(){open_('newSnapModal');}
async function submitNewSnap(){
  const version=document.getElementById('ns-ver').value.trim();
  if(!version){toast('请填写版本号',true);return;}
  const r=await fetch('/api/snapshots',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    version,name:document.getElementById('ns-name').value.trim(),
    created_by:document.getElementById('ns-creator').value.trim(),
    inherit_from:document.getElementById('ns-inherit').value||undefined
  })});

// ── 资源列表 ──
async function loadAssets(){
  if(!curSnapId){renderNoSnap();return;}
  const snap=snapshots.find(s=>s.id===curSnapId);
  const p=new URLSearchParams();
  if(fStatus)p.set('status',fStatus);
  if(fCat)p.set('category',fCat);
  const assets=await(await fetch(`/api/snapshots/${curSnapId}/assets?${p}`)).json();

  const mc=document.getElementById('mainContent');
  const isRefining=snap?.is_refining;
  const readonlyBanner=!isRefining?`<div class="readonly-banner">🔒 此快照为只读状态（非「完善中」），资源不可修改。点击快照的 ··· 菜单可开始完善。</div>`:'';
  const addBtn=isRefining?`<button class="btn btn-prim" onclick="open_('newAssetModal')">＋ 添加资源</button>`:'';

  const batchBar=`<div class="batch-bar" id="batchBar">
    <span id="batchCount">已选 0 个</span>
    <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px" onclick="batchUpdate('priority','紧急')">🔴 标为紧急</button>
    <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px" onclick="batchUpdate('priority','高')">🟠 标为高</button>
    ${isRefining?`<button class="btn btn-danger" style="padding:4px 10px;font-size:12px" onclick="batchDelete()">🗑 批量删除</button>`:''}
    <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px;margin-left:auto" onclick="clearSel()">✕ 取消</button>
  </div>`;

  const viewBtns=`<div style="display:flex;gap:4px">
    <button class="vbtn${curView==='list'?' active':''}" onclick="setView('list')">☰ 列表</button>
    <button class="vbtn${curView==='kanban'?' active':''}" onclick="setView('kanban')">⬛ 看板</button>
  </div>`;

  mc.innerHTML=`${readonlyBanner}
    <div class="list-top">
      <h2>${snap?.version||'快照'} · <span style="color:var(--text2);font-weight:400">${assets.length}个资源</span></h2>
      <div class="list-top-r">${viewBtns}${addBtn}</div>
    </div>
    ${batchBar}
    <div id="assetList"></div>`;

  if(curView==='list') renderList(assets,isRefining);
  else renderKanban(assets,isRefining);
}

function renderList(assets,isRefining){
  const el=document.getElementById('assetList');
  if(!assets.length){el.innerHTML=`<div class="empty"><div class="ico">📭</div><p>暂无资源</p></div>`;return;}
  el.innerHTML=assets.map(a=>{
    const delBtn=isRefining&&a.status==='pending'?`<button class="btn-del" onclick="askDel(event,'${a.id}','${esc(a.name)}')">🗑</button>`:'';
    const chk=isRefining?`<input type="checkbox" class="ac-check" onclick="event.stopPropagation();toggleSel('${a.id}',this)">`:'';
    return `<div class="ac" onclick="openDetail('${a.id}')">
      <div class="ac-top">
        ${chk}
        <div class="ac-name">${esc(a.name)}</div>
        <div class="ac-right">${delBtn}<span class="tag tag-${a.status}">${SL[a.status]||a.status}</span></div>
      </div>
      <div class="ac-meta">
        <span>📁 ${a.category||'其他'}</span>
        <span class="prio-${a.priority}">🔥 ${a.priority}</span>
        <span>${a.assignee?'👤 '+a.assignee:'未认领'}</span>
      </div>
    </div>`;
  }).join('');
}

function renderKanban(assets,isRefining){
  const cols=[['pending','待认领','d-pend'],['in_review','审核中','d-rev'],['changes_requested','需修改','d-chg'],['approved','已通过','d-ok'],['rejected','已拒绝','d-rej']];
  const grouped={};
  cols.forEach(([k])=>grouped[k]=[]);
  assets.forEach(a=>{if(grouped[a.status])grouped[a.status].push(a);});
  document.getElementById('assetList').innerHTML=`<div class="kanban">`+cols.map(([k,label,dc])=>{
    const cards=grouped[k].map(a=>`
      <div class="kk" onclick="openDetail('${a.id}')">
        <div class="kk-name">${esc(a.name)}</div>
        <div class="kk-meta">
          <span>📁${a.category}</span>
          <span class="prio-${a.priority}">🔥${a.priority}</span>
          ${a.assignee?`<span>👤${a.assignee}</span>`:''}
          ${isRefining&&k==='pending'?`<span onclick="event.stopPropagation();askDel(event,'${a.id}','${esc(a.name)}')" style="color:var(--danger);cursor:pointer">🗑</span>`:''}
        </div>
      </div>`).join('');
    return `<div class="kc">
      <div class="kc-head"><span><span class="dot ${dc}" style="width:8px;height:8px;display:inline-block;margin-right:5px"></span>${label}</span><span style="background:var(--bg);padding:2px 7px;border-radius:10px;font-size:11px">${grouped[k].length}</span></div>
      <div class="kc-body">${cards||'<div style="color:var(--text3);text-align:center;font-size:12px;padding:16px">暂无</div>'}</div>
    </div>`;
  }).join('')+'</div>';
}

function setView(v){curView=v;const snap=snapshots.find(s=>s.id===curSnapId);loadAssets();}
function setStatus(btn,v){fStatus=v;document.querySelectorAll('.sidebar .fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');loadAssets();}
function setCat(btn,v){fCat=v;document.querySelectorAll('#catBtns .fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');loadAssets();}

// ── 多选 ──
function toggleSel(id,cb){if(cb.checked)selectedIds.add(id);else selectedIds.delete(id);updateBatchBar();}
function clearSel(){selectedIds.clear();document.querySelectorAll('.ac-check').forEach(c=>c.checked=false);updateBatchBar();}
function updateBatchBar(){
  const bar=document.getElementById('batchBar');
  if(!bar)return;
  const n=selectedIds.size;
  document.getElementById('batchCount').textContent=`已选 ${n} 个`;
  if(n>0)bar.classList.add('show');else bar.classList.remove('show');
}
async function batchUpdate(field,value){
  if(!selectedIds.size)return;
  const r=await fetch('/api/assets/batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:[...selectedIds],action:'update',data:{[field]:value}})});
  const d=await r.json();
  if(r.ok){clearSel();toast(`✅ 已更新 ${d.processed} 个`);loadAssets();}
  else toast('❌ '+(d.error||'失败'),true);
}
async function batchDelete(){
  if(!selectedIds.size)return;
  pendingDelId=[...selectedIds];
  document.getElementById('del-msg').innerHTML=`将删除已选的 <strong>${selectedIds.size} 个</strong>资源（仅删除待认领状态的，其余跳过）。`;
  open_('delModal');
}

// ── 删除 ──
function askDel(e,id,name){e.stopPropagation();pendingDelId=id;document.getElementById('del-msg').innerHTML=`将删除资源：<strong>「${esc(name)}」</strong><br>只有「待认领」状态可以删除。`;open_('delModal');}
async function doDelete(){
  if(!pendingDelId)return;
  close_('delModal');
  if(Array.isArray(pendingDelId)){
    const r=await fetch('/api/assets/batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:pendingDelId,action:'delete'})});
    const d=await r.json();
    if(r.ok){clearSel();toast(`✅ 删除 ${d.processed} 个，跳过 ${d.skipped} 个`);loadAssets();}
    else toast('❌ '+(d.error||'失败'),true);
  } else {
    const r=await fetch(`/api/assets/${pendingDelId}`,{method:'DELETE'});
    const d=await r.json();
    if(r.ok){toast('✅ 已删除');loadAssets();}
    else toast('❌ '+(d.error||'删除失败'),true);
  }
  pendingDelId=null;
}

// ── 新建资源 ──
async function submitNewAsset(){
  const name=document.getElementById('na-name').value.trim();

}

    </div>

// ── 文件上传 ──
async function uploadFile(aid,input){
  const file=input.files[0];if(!file)return;
  const fd=new FormData();fd.append('file',file);
  const r=await fetch(`/api/assets/${aid}/upload`,{method:'POST',body:fd});
  const d=await r.json();
  if(r.ok){toast('✅ 文件已上传');openDetail(aid);}
  else toast('❌ '+(d.error||'上传失败'),true);
  input.value='';
}

// ── 图片预览 ──
function showImg(url){document.getElementById('imgOverlayImg').src=url;document.getElementById('imgOverlay').classList.add('open');}
function closeImgOverlay(){document.getElementById('imgOverlay').classList.remove('open');}

// ── 认领 ──
function openClaim(id){
  close_('detailModal');
  document.getElementById('am-title').textContent='认领资源';
  document.getElementById('am-body').innerHTML=`<div class="fg"><label>认领人</label><select id="cl-name">${(cfg.review?.reviewers||[]).map(r=>`<option>${r}</option>`).join('')}</select></div>`;
  document.getElementById('am-footer').innerHTML=`<button class="btn btn-ghost" onclick="close_('actModal')">取消</button><button class="btn btn-prim" onclick="doClaim('${id}')">确认认领</button>`;
  open_('actModal');
}
async function doClaim(id){
  const r=await fetch(`/api/assets/${id}/claim`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({assignee:document.getElementById('cl-name').value})});
  const d=await r.json();
  if(r.ok){close_('actModal');toast('✅ 已认领');loadAssets();}
  else toast('❌ '+(d.error||'认领失败'),true);
}

// ── 审核 ──
function openReview(id){
  close_('detailModal');
  document.getElementById('am-title').textContent='提交审核';
  document.getElementById('am-body').innerHTML=`
    <div class="fg"><label>审核员</label><select id="rv-name">${(cfg.review?.reviewers||[]).map(r=>`<option>${r}</option>`).join('')}</select></div>
    <div class="fg"><label>审核结果</label><select id="rv-status"><option value="approved">✅ 通过</option><option value="changes_requested">🔄 需要修改</option><option value="rejected">❌ 拒绝</option></select></div>
    <div class="fg"><label>审核意见</label><textarea id="rv-cmt" placeholder="填写反馈…"></textarea></div>`;
  document.getElementById('am-footer').innerHTML=`<button class="btn btn-ghost" onclick="close_('actModal')">取消</button><button class="btn btn-prim" onclick="doReview('${id}')">提交</button>`;
  open_('actModal');
}
async function doReview(id){
  const r=await fetch(`/api/assets/${id}/review`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reviewer:document.getElementById('rv-name').value,status:document.getElementById('rv-status').value,comment:document.getElementById('rv-cmt').value.trim()})});
  const d=await r.json();
  if(r.ok){close_('actModal');toast('✅ 审核已提交');loadAssets();}
  else toast('❌ '+(d.error||'提交失败'),true);
}

// ── 评论 ──
async function submitComment(aid){
  const content=document.getElementById('cmt-content').value.trim();
  if(!content){toast('请填写评论内
容',true);return;}
  const r=await fetch(`/api/assets/${aid}/comments`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({author:document.getElementById('cmt-author').value,content})});
  if(r.ok){document.getElementById('cmt-content').value='';openDetail(aid);}
  else toast('❌ 发送失败',true);
}
async function delComment(aid,cid){
  const r=await fetch(`/api/assets/${aid}/comments/${cid}`,{method:'DELETE'});
  if(r.ok) openDetail(aid);
  else toast('❌ 删除失败',true);
}

// ── 配置 ──
async function openCfg(){const txt=await(await fetch('/api/config/project')).text();document.getElementById('cfg-txt').value=txt;open_('cfgModal');}
async function saveCfg(){
  const r=await fetch('/api/config/project/raw',{method:'PUT',headers:{'Content-Type':'text/plain'},body:document.getElementById('cfg-txt').value});
  if(r.ok){close_('cfgModal');toast('✅ 配置已保存');loadCfg();}
  else toast('❌ 保存失败',true);
}

// ── 工具 ──
function open_(id){document.getElementById(id).classList.add('open');}
function close_(id){document.getElementById(id).classList.remove('open');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(s){if(!s)return'—';const d=new Date(s);return isNaN(d)?s:d.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}
function toast(msg,err=false){
  const w=document.getElementById('toastWrap');const el=document.createElement('div');
  el.className='toast'+(err?' err':'');el.textContent=msg;w.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}
document.querySelectorAll('.ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
init();
</script>
